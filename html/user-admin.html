  <form id="adminUpdateForm" style="display: flex; flex-direction: column; gap: 16px; padding: 20px;">
  <div class="form-group">
    <label for="adminUsername">Identifiant (Email ou Nom d'utilisateur)</label>
    <input type="text" id="adminUsername" placeholder="admin@midonmi.com" required
           style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
  </div>

  <div class="form-group">
    <label for="adminPassword">Nouveau mot de passe</label>
    <input type="password" id="adminPassword" placeholder="********" required
           style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
  </div>

  <div class="form-group">
    <label for="confirmPassword">Confirmer le mot de passe</label>
    <input type="password" id="confirmPassword" placeholder="********" required
           style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
  </div>

  <div class="form-actions" style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
    <button type="button" id="togglePasswords"
            style="padding: 10px 16px; background-color: #485a64; color: white; border: none; border-radius: 6px; cursor: pointer;">
      Afficher les mots de passe
    </button>

    <button type="submit"
            style="background-color: #198754; color: white; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 0px;">
      <i class='bx bxs-save' style="margin-right: 6px;"></i> Enregistrer les modifications
    </button>
  </div>
</form>

	<script src="../js/script.js"></script>

    <script>
  const toggleBtn = document.getElementById("togglePasswords");
  const passwordInputs = document.querySelectorAll("input[type='password']");
  const form = document.getElementById("adminUpdateForm");

  let show = false;

  toggleBtn.addEventListener("click", () => {
    show = !show;
    passwordInputs.forEach(input => {
      input.type = show ? "text" : "password";
    });
    toggleBtn.textContent = show ? "Masquer les mots de passe" : "Afficher les mots de passe";
  });

  form.addEventListener("submit", function(e) {
    e.preventDefault();
    const username = document.getElementById("adminUsername").value;
    const password = document.getElementById("adminPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (password !== confirm) {
      alert("❌ Les mots de passe ne correspondent pas.");
      return;
    }

    alert(`✅ Identifiant: ${username}\n🔒 Mot de passe validé.`);
    // Tu peux ici utiliser fetch pour envoyer au backend si besoin
  });
</script>
