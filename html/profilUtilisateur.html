<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="../css/style.css">
	<title>MIDONMI</title>
</head>
<body>
	<section id="sidebar">
		<a href="#" class="brand">
			<img class="logo" src="../img/pertolaLogo.png" alt="" srcset="">
		</a>
		<ul class="side-menu top">
			<li><a href="../html/index.html"><i class='bx bxs-dashboard'></i><span class="text">Tableau de bord</span></a></li>
			<li><a href="../html/service.html"><i class='bx bx-archive-in'></i><span class="text">Services</span></a></li>
			<li><a href="../html/temoignage.html"><i class='bx bxs-user-voice'></i><span class="text">Témoignages</span></a></li>
			<li class="active"><a href="../html/profilUtilisateur.html"><i class='bx bx-group'></i><span class="text">Gestion utilisateur</span></a></li>
            <li>
				<a href="../html/user-admin.html">
					<i class='bx bxs-cog'></i>
					<span class="text">User Admin</span>
				</a>
			</li>
		</ul>
		<ul class="side-menu">
			<li><a href="../html/deconnexion.html" class="logout"><i class='bx bxs-log-out-circle'></i><span class="text">Deconnexion</span></a></li>
		</ul>
	</section>

	<section id="content">
		<nav>
			<i class='bx bx-menu'></i>
			<form action="#">
				<div class="form-input">
					<input type="search" id="searchInput" placeholder="Rechercher...">
					<button><i class='bx bx-search'></i></button>
				</div>
			</form>
			<input type="checkbox" id="switch-mode" hidden>
			<label for="switch-mode" class="switch-mode"></label>
			<a href="#" class="profile"><h1>VA</h1></a>
		</nav>

		<main>
			<div class="head-title">
				<div class="left">
					<h1>Gestion utilisateur</h1>
				</div>
			</div>

			<div class="table-data">
				<div class="order">
					<div class="head">
						<h3>Liste des utilisateurs</h3>
					</div>
					<div class="table-responsive">
						<table class="table">
							<thead>
								<tr>
									<th>Id</th>
									<th>Nom</th>
									<th>Prénoms</th>
									<th>Email</th>
									<th>Téléphone</th>
								</tr>
							</thead>
							<tbody id="userTableBody">
								<!-- rempli par JS -->
							</tbody>
						</table>
					</div>
					<nav>
						<ul class="pagination" id="pagination"></ul>
					</nav>
				</div>
			</div>
		</main>
	</section>

	<script>
		const utilisateurs = [
			{id: 1, nom: "Koffi", prenoms: "Valentin", email: "valentin@mail.com", telephone: "0700000001"},
			{id: 2, nom: "Doe", prenoms: "John", email: "john.doe@mail.com", telephone: "0700000002"},
			{id: 3, nom: "Abalo", prenoms: "Mireille", email: "mireille@mail.com", telephone: "0700000003"},
			// Ajoutez plus de données fictives si besoin
		];

		const rowsPerPage = 7;
		let currentPage = 1;

		function renderTable(page, search = "") {
			const tbody = document.getElementById("userTableBody");
			tbody.innerHTML = "";
			let filtered = utilisateurs.filter(u => {
				return (
					u.nom.toLowerCase().includes(search) ||
					u.prenoms.toLowerCase().includes(search) ||
					u.email.toLowerCase().includes(search) ||
					u.telephone.toLowerCase().includes(search)
				);
			});
			const start = (page - 1) * rowsPerPage;
			const end = start + rowsPerPage;
			filtered.slice(start, end).forEach(user => {
				tbody.innerHTML += `
					<tr>
						<td>${user.id}</td>
						<td>${user.nom}</td>
						<td>${user.prenoms}</td>
						<td>${user.email}</td>
						<td>${user.telephone}</td>
					</tr>
				`;
			});
			renderPagination(filtered.length);
		}

		function renderPagination(totalItems) {
	const totalPages = Math.ceil(totalItems / rowsPerPage);
	const pagination = document.getElementById("pagination");
	pagination.innerHTML = "";

	for (let i = 1; i <= totalPages; i++) {
		const activeClass = i === currentPage ? 'class="active"' : "";
		pagination.innerHTML += `<li ${activeClass}><a href="#" onclick="changePage(${i})">${i}</a></li>`;
	}
}


		function changePage(page) {
			currentPage = page;
			renderTable(currentPage, document.getElementById("searchInput").value.toLowerCase());
		}

		document.getElementById("searchInput").addEventListener("input", function() {
			renderTable(1, this.value.toLowerCase());
		});

		document.addEventListener("DOMContentLoaded", function() {
			renderTable(currentPage);
		});
	</script>
</body>
</html>
